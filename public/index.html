<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Filevine → SharePoint</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100 text-gray-900">
    <div class="mx-auto max-w-5xl p-6">
      <h1 class="mb-6 text-2xl font-bold">Filevine → SharePoint</h1>

      <div id="error" class="mb-4 hidden rounded border border-red-300 bg-red-50 px-4 py-3 text-sm text-red-700"></div>

      <div class="grid gap-4 md:grid-cols-2">
        <!-- Projects -->
        <section class="rounded border border-gray-200 bg-white p-4">
          <h2 class="mb-3 font-semibold">Projects</h2>
          <p id="projects-status" class="mb-3 text-sm text-gray-500">Loading projects…</p>
          <ul id="projects-list" class="max-h-96 space-y-1 overflow-y-auto"></ul>
          <div class="mt-3 flex items-center justify-between gap-2">
            <button
              id="prev-projects-btn"
              type="button"
              class="rounded border border-gray-300 px-3 py-1.5 text-sm text-gray-700 hover:bg-gray-50 disabled:cursor-not-allowed disabled:opacity-50"
            >
              Previous
            </button>
            <p id="projects-page-info" class="text-xs text-gray-500">Page 1</p>
            <button
              id="next-projects-btn"
              type="button"
              class="rounded border border-gray-300 px-3 py-1.5 text-sm text-gray-700 hover:bg-gray-50 disabled:cursor-not-allowed disabled:opacity-50"
            >
              Next
            </button>
          </div>
        </section>

        <!-- Files + upload -->
        <section class="rounded border border-gray-200 bg-white p-4">
          <h2 class="mb-1 font-semibold">Files</h2>
          <p id="files-status" class="mb-3 text-sm text-gray-500">Click a project to see its files.</p>

          <ul id="files-list" class="mb-4 max-h-56 space-y-1 overflow-y-auto text-sm"></ul>

          <button
            id="sync-btn"
            type="button"
            disabled
            class="w-full rounded bg-blue-600 px-4 py-2 text-sm font-semibold text-white hover:bg-blue-700 disabled:cursor-not-allowed disabled:bg-gray-300"
          >
            Send files to SharePoint
          </button>

          <!-- Progress -->
          <div id="progress-box" class="mt-4 hidden">
            <div class="mb-1 flex justify-between text-sm text-gray-600">
              <span id="progress-text">Uploading…</span>
              <span id="progress-percent">0%</span>
            </div>
            <div class="h-2 overflow-hidden rounded bg-gray-200">
              <div id="progress-bar" class="h-full w-0 bg-blue-600 transition-all"></div>
            </div>
            <div class="mt-3 grid grid-cols-3 gap-2 text-center text-sm">
              <div class="rounded bg-gray-50 p-2">
                <div id="stat-total" class="text-lg font-semibold">0</div>
                <div class="text-xs text-gray-500">Total</div>
              </div>
              <div class="rounded bg-green-50 p-2">
                <div id="stat-ok" class="text-lg font-semibold text-green-700">0</div>
                <div class="text-xs text-gray-500">Success</div>
              </div>
              <div class="rounded bg-red-50 p-2">
                <div id="stat-fail" class="text-lg font-semibold text-red-700">0</div>
                <div class="text-xs text-gray-500">Failed</div>
              </div>
            </div>
            <ul id="result-list" class="mt-3 max-h-40 space-y-1 overflow-y-auto text-sm"></ul>
          </div>
        </section>
      </div>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
